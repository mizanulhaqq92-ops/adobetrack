<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AdobeTrack</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f3f4f6;--card:#fff;--card2:#f9fafb;--input:#f3f4f6;--border:#e5e7eb;--border2:#d1d5db;--text:#111827;--muted:#6b7280;--muted2:#9ca3af;--accent:#E02020;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body.dark{--bg:#0d0f1a;--card:#181a2a;--card2:#1e2035;--input:#161826;--border:#252840;--border2:#2e3152;--text:#e8eaf6;--muted:#6b7280;--muted2:#4b5163}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* NAV */
.nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:54px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:16px;color:var(--text);text-decoration:none}
.logo-box{background:#E02020;color:#fff;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
.nav-tabs{display:flex;gap:4px;margin-left:8px}
.nav-tab{padding:6px 16px;border-radius:20px;font-size:13px;cursor:pointer;color:var(--muted);border:1px solid transparent;background:transparent;font-weight:500;font-family:var(--font);transition:all .15s}
.nav-tab:hover{background:var(--input);color:var(--text)}
.nav-tab.active{background:#FEE2E2;color:#E02020;border-color:rgba(224,32,32,.2)}
body.dark .nav-tab.active{background:rgba(224,32,32,.15);color:#f87171}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.avatar{width:30px;height:30px;border-radius:50%;background:#1D6FA4;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
.nav-name{font-size:13px;color:var(--text);font-weight:500}
.theme-btn{width:30px;height:30px;border:1px solid var(--border2);border-radius:6px;background:var(--card);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:var(--font)}

/* PAGE */
.page{padding:22px 24px;display:none;max-width:1160px;margin:0 auto}
.page.active{display:block}

/* SEARCH */
.search-row{display:flex;gap:10px;margin-bottom:14px}
.search-wrap{position:relative;flex:1}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted2);pointer-events:none}
.s-input{width:100%;padding:11px 14px 11px 38px;border:1.5px solid var(--border2);border-radius:9px;font-size:14px;background:var(--card);color:var(--text);outline:none;font-family:var(--font);transition:border .15s}
.s-input:focus{border-color:#E02020}
.btn-red{background:#E02020;color:#fff;border:none;border-radius:9px;padding:11px 22px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap;font-family:var(--font);transition:background .15s}
.btn-red:hover{background:#C41A1A}
.btn-red:disabled{background:#f87171;cursor:wait}

/* FILTERS */
.filters{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.fl{font-size:12px;color:var(--muted);font-weight:600;margin-right:2px}
.f-btn,.t-btn{padding:5px 13px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);font-weight:500;font-family:var(--font);transition:all .12s}
.f-btn:hover,.t-btn:hover{border-color:var(--border2);color:var(--text)}
.f-btn.active{background:#E02020;color:#fff;border-color:#E02020}
.t-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.filter-sep{width:1px;height:20px;background:var(--border);margin:0 2px}

/* RESULTS HDR */
.results-hdr{font-size:13px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.results-hdr strong{color:var(--text)}
.ai-btn{font-size:12px;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:5px 11px;background:var(--card);cursor:pointer;font-family:var(--font)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(218px,1fr));gap:14px}
.card{background:var(--card);border-radius:11px;border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s}
.card:hover{border-color:var(--border2)}
.card-thumb{width:100%;height:152px;background:var(--input);display:flex;align-items:center;justify-content:center;overflow:hidden}
.card-thumb img{width:100%;height:100%;object-fit:cover}
.no-img{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--border2)}
.no-img span{font-size:11px;color:var(--muted2)}
.card-body{padding:10px 12px 12px;flex:1;display:flex;flex-direction:column;gap:6px}
.card-title{font-size:12px;font-weight:600;color:var(--text);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-title a{color:var(--text);text-decoration:none}
.card-title a:hover{color:#E02020}
.stats-row{display:flex;gap:5px}
.stat-dl{background:#2563EB;color:#fff;font-size:11px;font-weight:600;padding:3px 8px;border-radius:5px;line-height:1.35;text-align:center}
.stat-dl small{display:block;font-size:9px;font-weight:400;opacity:.85}
.stat-age{background:#16A34A;color:#fff;font-size:11px;font-weight:600;padding:3px 8px;border-radius:5px;line-height:1.35;text-align:center}
.stat-age small{display:block;font-size:9px;font-weight:400;opacity:.85}
.meta-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.cat-tag{font-size:11px;padding:2px 7px;border-radius:4px;background:#FEF3C7;color:#92400E;font-weight:500}
body.dark .cat-tag{background:rgba(234,179,8,.15);color:#fbbf24}
.author{font-size:11px;color:var(--muted)}
.card-date{font-size:11px;color:var(--muted2)}
.kw-section{margin-top:auto}
.kw-header{font-size:11px;color:var(--muted2);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.copy-btn{font-size:11px;color:#2563EB;cursor:pointer;border:none;background:transparent;padding:0;font-family:var(--font)}
.kw-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.kw-tag{font-size:11px;background:var(--input);color:var(--muted);padding:2px 7px;border-radius:4px}
.more-kw{font-size:11px;color:#2563EB}
.gen-btn{width:100%;padding:6px;border-radius:7px;font-size:12px;border:1px solid var(--border);background:var(--card2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-weight:500;font-family:var(--font);transition:all .12s}
.gen-btn:hover{background:var(--input);color:var(--text)}

/* LOADING/EMPTY/ERROR */
.loading-box{text-align:center;padding:60px 20px;color:var(--muted)}
.spin{display:inline-block;width:30px;height:30px;border:3px solid var(--border2);border-top-color:#E02020;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
.loading-box p{font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-box{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-box svg{width:44px;height:44px;color:var(--border2);margin-bottom:12px;display:block;margin-inline:auto}
.empty-box p{font-size:14px}
.error-box{background:#FEF2F2;border:1px solid #FCA5A5;border-radius:9px;padding:14px 18px;font-size:13px;color:#991B1B;line-height:1.6}
body.dark .error-box{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#fca5a5}

/* PT */
.pt-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px}
.pt-sub{font-size:13px;color:var(--muted);margin-bottom:16px}
.pagination{display:flex;align-items:center;gap:7px}
.pg-btn{padding:5px 12px;border-radius:6px;font-size:12px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-weight:500;font-family:var(--font);transition:all .12s}
.pg-btn:hover:not(:disabled){background:var(--input)}
.pg-btn:disabled{opacity:.35;cursor:default}
.pg-info{font-size:12px;color:var(--muted);font-weight:500}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--text);color:var(--bg);padding:9px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:9999}
.toast.show{opacity:1}
</style>
</head>
<body>

<nav class="nav">
  <a class="logo" href="#">
    <div class="logo-box">A</div>
    AdobeTrack
  </a>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('keyword')">Keyword Search</button>
    <button class="nav-tab" onclick="switchTab('portfolio')">Portfolio Tracker</button>
  </div>
  <div class="nav-right">
    <div class="avatar">M</div>
    <span class="nav-name">Masud Choudhury</span>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
  </div>
</nav>

<!-- KEYWORD -->
<div id="page-keyword" class="page active">
  <div class="search-row">
    <div class="search-wrap">
      <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="17" height="17"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="s-input" id="kw-input" type="text" placeholder="Search Adobe Stock keywords..." value="Vector dotted world map."/>
    </div>
    <button class="btn-red" id="kw-btn" onclick="doKwSearch()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="15" height="15"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Search
    </button>
  </div>
  <div class="filters">
    <span class="fl">Sort:</span>
    <button class="f-btn" onclick="setF(this,'kwSort','relevance')">Relevance</button>
    <button class="f-btn active" onclick="setF(this,'kwSort','most_downloaded')">Most Downloaded</button>
    <button class="f-btn" onclick="setF(this,'kwSort','newest')">Newest</button>
    <button class="f-btn" onclick="setF(this,'kwSort','featured')">Featured</button>
    <button class="f-btn" onclick="setF(this,'kwSort','undiscovered')">Undiscovered</button>
    <div class="filter-sep"></div>
    <span class="fl">Type:</span>
    <button class="t-btn active" onclick="setT(this,'kwType','all')">All</button>
    <button class="t-btn" onclick="setT(this,'kwType','photos')">Photos</button>
    <button class="t-btn" onclick="setT(this,'kwType','vectors')">Vectors</button>
    <button class="t-btn" onclick="setT(this,'kwType','illustrations')">Illustrations</button>
    <button class="t-btn" onclick="setT(this,'kwType','videos')">Videos</button>
  </div>
  <div class="results-hdr">
    <span id="kw-count"></span>
    <button class="ai-btn">⚙ AI Prompt Settings</button>
  </div>
  <div id="kw-results">
    <div class="empty-box">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>Keyword দিয়ে Search করুন</p>
    </div>
  </div>
</div>

<!-- PORTFOLIO -->
<div id="page-portfolio" class="page">
  <div class="pt-title">Portfolio Tracker</div>
  <div class="pt-sub">Enter an Adobe Stock contributor ID to explore their portfolio.</div>
  <div class="search-row">
    <div class="search-wrap">
      <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="17" height="17"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 1 1-8 0 4 4 0 0 1 8 0zM12 14a7 7 0 0 0-7 7h14a7 7 0 0 0-7-7z"/></svg>
      <input class="s-input" id="pt-input" type="text" placeholder="Contributor ID (e.g. 211359177)" value="211359177"/>
    </div>
    <button class="btn-red" id="pt-btn" onclick="doPtSearch()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="15" height="15"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Track
    </button>
  </div>
  <div class="filters">
    <span class="fl">Sort:</span>
    <button class="f-btn" onclick="setF(this,'ptSort','relevance')">Relevance</button>
    <button class="f-btn active" onclick="setF(this,'ptSort','most_downloaded')">Most Downloaded</button>
    <button class="f-btn" onclick="setF(this,'ptSort','newest')">Newest</button>
    <button class="f-btn" onclick="setF(this,'ptSort','featured')">Featured</button>
    <button class="f-btn" onclick="setF(this,'ptSort','undiscovered')">Undiscovered</button>
    <div class="filter-sep"></div>
    <span class="fl">Type:</span>
    <button class="t-btn active" onclick="setT(this,'ptType','all')">All</button>
    <button class="t-btn" onclick="setT(this,'ptType','photos')">Photos</button>
    <button class="t-btn" onclick="setT(this,'ptType','vectors')">Vectors</button>
    <button class="t-btn" onclick="setT(this,'ptType','illustrations')">Illustrations</button>
    <button class="t-btn" onclick="setT(this,'ptType','videos')">Videos</button>
  </div>
  <div class="results-hdr">
    <span id="pt-count"></span>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <button class="ai-btn">⚙ AI Prompt Settings</button>
      <div class="pagination">
        <button class="pg-btn" id="pt-prev" onclick="ptChangePage(-1)" disabled>← Prev</button>
        <span class="pg-info" id="pt-page">Page 1</span>
        <button class="pg-btn" id="pt-next" onclick="ptChangePage(1)" disabled>Next →</button>
      </div>
    </div>
  </div>
  <div id="pt-results">
    <div class="empty-box">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 1 1-8 0 4 4 0 0 1 8 0zM12 14a7 7 0 0 0-7 7h14a7 7 0 0 0-7-7z"/></svg>
      <p>Contributor ID দিয়ে Track করুন</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// এখানে Vercel deploy করার পরে আপনার URL দিন
// যেমন: https://adobetrack-abc123.vercel.app
const API_BASE = window.location.origin;

let kwSort='most_downloaded', kwType='all';
let ptSort='most_downloaded', ptType='all';
let ptPage=1, ptTotal=1, ptId='';

function toggleTheme(){
  const d=document.body.classList.toggle('dark');
  document.getElementById('themeBtn').textContent=d?'🌞':'🌙';
  localStorage.setItem('at_theme',d?'dark':'light');
}
function switchTab(tab){
  document.getElementById('page-keyword').classList.toggle('active',tab==='keyword');
  document.getElementById('page-portfolio').classList.toggle('active',tab==='portfolio');
  document.querySelectorAll('.nav-tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='keyword')||(i===1&&tab==='portfolio')));
}
function setF(btn,key,val){window[key]=val;btn.closest('.filters').querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function setT(btn,key,val){window[key]=val;btn.closest('.filters').querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function timeAgo(d){if(!d)return'Unknown';const diff=Math.floor((Date.now()-new Date(d))/(1000*60*60*24*30));if(diff<1)return'This month';if(diff<12)return diff+' months ago';const y=Math.floor(diff/12);return y+' year'+(y>1?'s':'')+' ago';}
function fmtNum(n){return n?Number(n).toLocaleString():'0';}
function fmtDate(d){return d?new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):''}

function renderCards(items,container){
  if(!items||!items.length){container.innerHTML='<div class="empty-box"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 0 1 5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg><p>কোনো result পাওয়া যায়নি।</p></div>';return;}
  container.innerHTML='<div class="grid">'+items.map(item=>{
    const kws=item.keywords||[];const show=kws.slice(0,5);const extra=kws.length-5;
    const link=item.detail_url||'#';const thumb=item.thumbnail_url||'';
    const cat=item.category||item.content_type||'';
    return `<div class="card">
      <a href="${link}" target="_blank" rel="noopener" style="text-decoration:none">
        <div class="card-thumb">${thumb?`<img src="${thumb}" alt="" loading="lazy" onerror="this.closest('.card-thumb').innerHTML='<div class=\\'no-img\\'><svg width=\\'34\\' height=\\'34\\' fill=\\'none\\' stroke=\\'currentColor\\' viewBox=\\'0 0 24 24\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'2\\'/></svg><span>No preview</span></div>'"/>` : `<div class="no-img"><svg width="34" height="34" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg><span>No preview</span></div>`}</div>
      </a>
      <div class="card-body">
        <div class="card-title"><a href="${link}" target="_blank" rel="noopener">${item.title||'Untitled'}</a></div>
        <div class="stats-row">
          <div class="stat-dl">${fmtNum(item.nb_downloads)}<small>DOWNLOADS</small></div>
          <div class="stat-age">${timeAgo(item.upload_date)}<small>UPLOAD</small></div>
        </div>
        ${item.author?`<div class="author">👤 ${item.author}</div>`:''}
        <div class="meta-row">
          ${cat?`<span class="cat-tag">${cat}</span>`:''}
          ${item.upload_date?`<span class="card-date">${fmtDate(item.upload_date)}</span>`:''}
        </div>
        ${kws.length?`<div class="kw-section">
          <div class="kw-header">Keywords <button class="copy-btn" onclick="event.preventDefault();copyK(${JSON.stringify(kws)})">⎘ Copy all</button></div>
          <div class="kw-tags">${show.map(k=>`<span class="kw-tag">${k}</span>`).join('')}${extra>0?`<span class="more-kw">+${extra} more</span>`:''}</div>
        </div>`:''}
        <button class="gen-btn" onclick="event.preventDefault();genP('${(item.title||'').replace(/'/g,'')}',${JSON.stringify(kws.slice(0,10))})">⚡ Generate Prompt</button>
      </div>
    </div>`;
  }).join('')+'</div>';
}

function copyK(kws){navigator.clipboard.writeText(kws.join(', ')).then(()=>showToast('Keywords copied!')).catch(()=>showToast('Failed'));}
function genP(title,kws){navigator.clipboard.writeText(`Adobe Stock prompt:\nTitle: "${title}"\nKeywords: ${kws.join(', ')}`).then(()=>showToast('Prompt copied!')).catch(()=>{});}

async function doKwSearch(){
  const q=document.getElementById('kw-input').value.trim();
  if(!q){showToast('Keyword দিন!');return;}
  const res=document.getElementById('kw-results'),cnt=document.getElementById('kw-count'),btn=document.getElementById('kw-btn');
  res.innerHTML='<div class="loading-box"><div class="spin"></div><p>Adobe Stock search করা হচ্ছে...</p></div>';
  cnt.textContent='';btn.disabled=true;
  try{
    const r=await fetch(`${API_BASE}/api/search?q=${encodeURIComponent(q)}&sort=${kwSort}&type=${kwType}&page=1`);
    const data=await r.json();
    if(data.error) throw new Error(data.error);
    cnt.innerHTML=`<strong>${fmtNum(data.total)}</strong> results for "<strong>${q}</strong>"`;
    renderCards(data.items,res);
  }catch(e){
    res.innerHTML=`<div class="error-box">❌ ${e.message}</div>`;cnt.textContent='';
  }finally{btn.disabled=false;}
}

async function doPtSearch(){
  const id=document.getElementById('pt-input').value.trim();
  if(!id){showToast('ID দিন!');return;}
  ptId=id;ptPage=1;await loadPtPage();
}
async function loadPtPage(){
  const res=document.getElementById('pt-results'),cnt=document.getElementById('pt-count'),btn=document.getElementById('pt-btn');
  document.getElementById('pt-prev').disabled=true;
  document.getElementById('pt-next').disabled=true;
  document.getElementById('pt-page').textContent='Page '+ptPage;
  res.innerHTML='<div class="loading-box"><div class="spin"></div><p>Portfolio load করা হচ্ছে...</p></div>';
  cnt.textContent='';btn.disabled=true;
  try{
    const r=await fetch(`${API_BASE}/api/portfolio?creator_id=${ptId}&sort=${ptSort}&type=${ptType}&page=${ptPage}`);
    const data=await r.json();
    if(data.error) throw new Error(data.error);
    ptTotal=data.pages||1;
    cnt.innerHTML=`<strong>${fmtNum(data.total)}</strong> items — Contributor <strong>${ptId}</strong>${data.contributor_name?' ('+data.contributor_name+')':''}`;
    document.getElementById('pt-prev').disabled=ptPage<=1;
    document.getElementById('pt-next').disabled=ptPage>=ptTotal;
    document.getElementById('pt-page').textContent='Page '+ptPage;
    renderCards(data.items,res);
  }catch(e){
    res.innerHTML=`<div class="error-box">❌ ${e.message}</div>`;cnt.textContent='';
  }finally{btn.disabled=false;}
}
function ptChangePage(dir){const np=ptPage+dir;if(np<1||np>ptTotal)return;ptPage=np;loadPtPage();}

document.getElementById('kw-input').addEventListener('keydown',e=>{if(e.key==='Enter')doKwSearch();});
document.getElementById('pt-input').addEventListener('keydown',e=>{if(e.key==='Enter')doPtSearch();});
